<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tile_wm</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="taskbar">
      <!-- Left spacer -->
      <div class="spacer"></div>

      <!-- Menu button (leftmost) -->
      <div id="menu-section">
        <button id="menu-btn" class="menu-btn" title="Menu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="3" width="16" height="2.5" rx="1.25" fill="currentColor"/>
            <rect x="2" y="9" width="16" height="2.5" rx="1.25" fill="currentColor"/>
            <rect x="2" y="15" width="16" height="2.5" rx="1.25" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Tiling mode buttons -->
      <div id="tiling-section">
        <button id="tiling-free" class="tiling-btn active" data-mode="free" title="Float mode">
          <span class="icon"><img src="/icons/float.png" alt="Float" /></span>
        </button>
        <button id="tiling-2w" class="tiling-btn" data-mode="2windows" title="2Win">
          <span class="icon"><img src="/icons/2Win.png" alt="2Win" /></span>
        </button>
        <button id="tiling-3w" class="tiling-btn" data-mode="3windows" title="3Win">
          <span class="icon"><img src="/icons/3Win.png" alt="3Win" /></span>
        </button>
        <button id="tiling-4w" class="tiling-btn" data-mode="4windows" title="4Win">
          <span class="icon"><img src="/icons/4Win.png" alt="4Win" /></span>
        </button>
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Desktop switcher + app icons (generated by JS) -->
      <div id="desktop-section">
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Right spacer -->
      <div class="spacer"></div>
    </div>

    <!-- Float mode window (draggable popup) -->
    <div id="float-window" class="float-window hidden">
      <div id="float-header" class="float-header">
        <span>tile_wm</span>
      </div>
      <div class="float-content">
        <div class="float-desktop-section">
          <div class="float-label">Desktop</div>
          <div class="float-desktop-btns" id="float-desktop-btns">
          </div>
        </div>
        <div class="float-tiling-section">
          <div class="float-label">Tiling</div>
          <div class="float-tiling-btns">
            <button class="float-tiling-btn active" data-mode="free">Free</button>
            <button class="float-tiling-btn" data-mode="2windows">2Win</button>
            <button class="float-tiling-btn" data-mode="3windows">3Win</button>
            <button class="float-tiling-btn" data-mode="4windows">4Win</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
