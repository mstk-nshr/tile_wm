<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tile_wm</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="taskbar">
      <!-- Left: Desktop switcher (generated by JS) -->
      <div id="desktop-section">
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Center: Tiling mode buttons -->
      <div id="tiling-section">
        <button id="tiling-free" class="tiling-btn active" data-mode="free">
          <span class="icon">⊞</span>
          <span class="label">Free</span>
        </button>
        <button id="tiling-2w" class="tiling-btn" data-mode="2windows">
          <span class="icon">▮▮</span>
          <span class="label">2Win</span>
        </button>
        <button id="tiling-3w" class="tiling-btn" data-mode="3windows">
          <span class="icon">▮▮▮</span>
          <span class="label">3Win</span>
        </button>
        <button id="tiling-4w" class="tiling-btn" data-mode="4windows">
          <span class="icon">▮▮▮▮</span>
          <span class="label">4Win</span>
        </button>
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Right: Menu button -->
      <div id="menu-section">
        <button id="menu-btn" class="menu-btn" title="Menu">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
            <circle cx="8" cy="3" r="1.5" fill="currentColor"/>
            <circle cx="8" cy="13" r="1.5" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Float mode window (draggable popup) -->
    <div id="float-window" class="float-window hidden">
      <div id="float-header" class="float-header">
        <span>tile_wm</span>
      </div>
      <div class="float-content">
        <div class="float-desktop-section">
          <div class="float-label">Desktop</div>
          <div class="float-desktop-btns" id="float-desktop-btns">
          </div>
        </div>
        <div class="float-tiling-section">
          <div class="float-label">Tiling</div>
          <div class="float-tiling-btns">
            <button class="float-tiling-btn active" data-mode="free">Free</button>
            <button class="float-tiling-btn" data-mode="2windows">2Win</button>
            <button class="float-tiling-btn" data-mode="3windows">3Win</button>
            <button class="float-tiling-btn" data-mode="4windows">4Win</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
